# =============================================================================
# universcan-pipe -- configuration (tags.yaml)   [ASCII only; no smart quotes/dashes]
# =============================================================================
# Pipeline stages, in order:
#   1. read_e57.py   : stream a full-scale E57 -> manageable .ply (+ .meta.json)
#   2. flood_fill.py : covered-space test isolates indoor surfaces (flood_fill block)
#   3. abstract.py   : detect surfaces -> tagged faces -> DXF
#
# How abstract.py finds surfaces (all statistical, NORMAL-FREE):
#   FLOOR / CEILING    = peaks in the Z histogram (where points pile up in height)
#   LEFT / RIGHT walls = peaks in the X histogram (wall perp to X = constant X = a spike)
#   FRONT / REAR walls = peaks in the Y histogram
#   A wall is sparse in 3D but becomes a dense peak when projected onto its
#   perpendicular axis, so it is found statistically, not by RANSAC plane-peeling
#   (RANSAC ranks by inlier count, so sparse walls always lose to dense clutter).
#   Each wall peak is re-associated to the FULL cloud so it spans floor-to-ceiling,
#   then validated: long + tall = WALL, short = column -> STRUCTURE.
#   Furniture dropped by min_arch_area_m2. Assumes axis-aligned walls (PCA-align if not).
#
# debug: true  => per-stage trace to stdout + debug.json (every face kept/dropped + reason)
# WARNING: yaml.safe_dump strips comments AND can drop keys on a bad round-trip. Keep THIS
#          documented file as source of truth; edit values with sed/str_replace only.
# =============================================================================

tags:
  FLOOR: Main floor / ground plane
  CEILING: Ceiling / underside of roof
  WALL_LEFT: House-left side wall (audience POV)
  WALL_RIGHT: House-right side wall
  WALL_REAR: Rear wall (behind audience)
  WALL_FRONT: Front wall / proscenium plane
  AUDIENCE_MAIN: Main raked seating / listening plane
  AUDIENCE_BALCONY: Balcony / upper-tier listening plane
  STAGE: Stage deck / performance surface
  BALCONY_FACE: Vertical face of a balcony (reflector)
  STRUCTURE: Unclassified structural surface
debug: true
datum:
  use_fixed_datum: false
  floor_z: 0.0
  origin_xy:
  - 0.0
  - 0.0
pipeline:
  voxel_m: 0.05
  ransac_dist_m: 0.03
  ransac_n: 3
  ransac_iters: 1000
  min_plane_points: 800
  max_planes: 200
  dbscan_eps_m: 0.5
  dbscan_min_points: 25
  simplify_tol_m: 0.1
  wall_strip_margin_m: 1.0
  normal_split_cos: 0.85
classify:
  vertical_cos: 0.995
  horizontal_cos: 0.2
  floor_ceiling_split_frac: 0.5
  stage:
    enabled: true
    min_z_m: 0.4
    max_z_m: 1.6
    front_zone_frac: 0.35
  balcony_face:
    min_z_m: 2.0
    max_height_m: 2.5
  band_tol_m: 1.0
  ceiling_span_m: 3.0
  wall_perim_frac: 0.12
  min_wall_height_frac: 0.3
  min_arch_area_m2: 8.0
  min_wall_length_frac: 0.25
  wall_hist_bin_m: 0.1
  wall_assoc_tol_m: 0.15
downstream_layers:
  mapp3d: null
  arraycalc:
    AUDIENCE_MAIN: Audience_A
    AUDIENCE_BALCONY: Audience_B
    STAGE: Source_Stage
  venue_synthesis: null
  soundvision: null
splat:
  opacity_thresh: 0.5
  scale_pct: 99.0
  scale_max_m: null
  color_from_sh: true
crop:
  enabled: true
  apply_to_all: false
  work_voxel_m: 0.25
  radius_outlier_nb: 8
  radius_outlier_r_m: 0.75
  dbscan_eps_m: 1.0
  dbscan_min_points: 20
  keep_rel_to_largest: 0.15
  min_cluster_points: 500
flood_fill:
  enabled: true
  fill_voxel_m: 0.2
  seal_vox: 2
  min_room_m3: 10.0