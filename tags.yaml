# =====================================================================
# tags.yaml  —  THE CONTRACT.
# The Python side (abstract.py) writes faces tagged with these canonical
# names; the SketchUp side (build_skp.rb) reads them and assigns Tags;
# every downstream SPL tool keys off the per-tool layer map at the bottom.
# Change a name here and you change it everywhere — that is the point.
# =====================================================================

# ---- canonical tag vocabulary --------------------------------------
# The only tags the rest of the system is allowed to emit. Keep this list
# small and stable. STRUCTURE is the catch-all for anything unclassified.
tags:
  FLOOR: Main floor / ground plane
  CEILING: Ceiling / underside of roof
  WALL_LEFT: House-left side wall (audience POV)
  WALL_RIGHT: House-right side wall
  WALL_REAR: Rear wall (behind audience)
  WALL_FRONT: Front wall / proscenium plane
  AUDIENCE_MAIN: Main raked seating / listening plane
  AUDIENCE_BALCONY: Balcony / upper-tier listening plane
  STAGE: Stage deck / performance surface
  BALCONY_FACE: Vertical face of a balcony (reflector)
  STRUCTURE: Unclassified structural surface
datum:
  use_fixed_datum: false
  floor_z: 0.0
  origin_xy:
  - 0.0
  - 0.0
pipeline:
  voxel_m: 0.05
  ransac_dist_m: 0.03
  ransac_n: 3
  ransac_iters: 1000
  min_plane_points: 800
  max_planes: 200
  dbscan_eps_m: 0.5
  dbscan_min_points: 25
  simplify_tol_m: 0.1
classify:
  vertical_cos: 0.995
  horizontal_cos: 0.2
  floor_ceiling_split_frac: 0.5
  stage:
    enabled: true
    min_z_m: 0.4
    max_z_m: 1.6
    front_zone_frac: 0.35
  balcony_face:
    min_z_m: 2.0
    max_height_m: 2.5
  band_tol_m: 1.0
  ceiling_span_m: 3.0
  wall_perim_frac: 0.12
  min_wall_height_frac: 0.3
  min_arch_area_m2: 8.0
downstream_layers:
  mapp3d: null
  arraycalc:
    AUDIENCE_MAIN: Audience_A
    AUDIENCE_BALCONY: Audience_B
    STAGE: Source_Stage
  venue_synthesis: null
  soundvision: null
splat:
  opacity_thresh: 0.5
  scale_pct: 99.0
  scale_max_m: null
  color_from_sh: true
crop:
  enabled: true
  apply_to_all: false
  work_voxel_m: 0.25
  radius_outlier_nb: 8
  radius_outlier_r_m: 0.75
  dbscan_eps_m: 1.0
  dbscan_min_points: 20
  keep_rel_to_largest: 0.15
  min_cluster_points: 500
flood_fill:
  enabled: true
  fill_voxel_m: 0.2
  seal_vox: 2
  min_room_m3: 10.0